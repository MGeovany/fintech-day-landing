<!-- ============== HERO ============== -->
<section class="hero">
  <canvas class="hero-grid" id="hero-grid" aria-hidden="true"></canvas>
  <span class="hero-corner hero-corner--tl" aria-hidden="true"></span>
  <span class="hero-corner hero-corner--tl-soft" aria-hidden="true"></span>
  <span class="hero-corner hero-corner--br" aria-hidden="true"></span>
  <span class="hero-orb hero-orb--1" aria-hidden="true"></span>
  <span class="hero-orb hero-orb--2" aria-hidden="true"></span>
  <span class="hero-orb hero-orb--3" aria-hidden="true"></span>
  <span class="hero-vignette" aria-hidden="true"></span>

  <div class="hero-content">
    <div class="hero-pills" data-reveal>
      <span class="hero-pill">Open Banking</span>
      <span class="hero-pill hero-pill--cyan">Pagos Digitales</span>
      <span class="hero-pill">Ciberseguridad</span>
      <span class="hero-pill">Blockchain</span>
    </div>

    <h1
      class="m-0 font-display text-[clamp(1.75rem,6.5vw,5.5rem)] font-medium leading-[1.05] tracking-[-0.03em] max-sm:text-[clamp(1.75rem,8vw,2.75rem)]"
      data-reveal
    >
      <span
        class="block overflow-visible bg-gradient-to-b from-white via-zinc-300 to-zinc-400 bg-clip-text pb-[0.06em] text-transparent [box-decoration-break:clone] [-webkit-box-decoration-break:clone]"
      >
        <span class="block whitespace-nowrap">Honduras&nbsp;Fintech</span>
        <span class="block overflow-visible pb-[0.14em]">Day 2026</span>
      </span>
    </h1>

    <p class="hero-sub" data-reveal>
      Conecta. Innova. Lidera el Cambio Financiero.<br />
      500+ asistentes, 20+ speakers y 40–50 stands en un solo día.
    </p>

    <div class="hero-ctas" data-reveal>
      <a href="/registro" class="btn-pill-cta btn-pill-cta--accent" data-magnetic>
        <span>Obtener entradas</span>
      </a>
      <a
        href="#contacto"
        class="btn-arrow"
        data-magnetic
        aria-label="Ir a contacto"
      >
        <svg
          viewBox="0 0 24 24"
          width="16"
          height="16"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M7 17L17 7M9 7h8v8"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
    </div>

    <div
      class="hero-countdown"
      id="event-countdown"
      data-reveal
      aria-live="polite"
      aria-label="Cuenta regresiva al Honduras Fintech Day 2026"
    >
      <p class="hero-countdown-label">Faltan para el evento</p>
      <div class="hero-countdown-grid" role="group" aria-label="Tiempo restante">
        <div class="hero-countdown-cell">
          <span class="hero-countdown-value" data-count="days">00</span>
          <span class="hero-countdown-unit">días</span>
        </div>
        <span class="hero-countdown-sep" aria-hidden="true"><i></i><i></i></span>
        <div class="hero-countdown-cell">
          <span class="hero-countdown-value" data-count="hours">00</span>
          <span class="hero-countdown-unit">horas</span>
        </div>
        <span class="hero-countdown-sep" aria-hidden="true"><i></i><i></i></span>
        <div class="hero-countdown-cell">
          <span class="hero-countdown-value" data-count="minutes">00</span>
          <span class="hero-countdown-unit">minutos</span>
        </div>
        <span class="hero-countdown-sep" aria-hidden="true"><i></i><i></i></span>
        <div class="hero-countdown-cell">
          <span class="hero-countdown-value" data-count="seconds">00</span>
          <span class="hero-countdown-unit">segundos</span>
        </div>
      </div>
    </div>
  </div>
</section>
