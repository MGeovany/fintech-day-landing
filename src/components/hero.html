<!-- ============== HERO ============== -->
<section class="hero">
  <canvas class="hero-grid" id="hero-grid" aria-hidden="true"></canvas>
  <span class="hero-corner hero-corner--tl" aria-hidden="true"></span>
  <span class="hero-corner hero-corner--tl-soft" aria-hidden="true"></span>
  <span class="hero-corner hero-corner--br" aria-hidden="true"></span>
  <span class="hero-vignette" aria-hidden="true"></span>

  <div class="hero-content">
    <p class="hero-meta" data-reveal>2026 · San Pedro Sula, Honduras</p>

    <h1
      class="hero-title m-0 font-display text-[clamp(1.75rem,6.5vw,5.5rem)] font-medium leading-[1.05] tracking-[-0.03em] max-sm:text-[clamp(1.75rem,8vw,2.75rem)]"
    >
      <span
        class="hero-title-gradient block overflow-visible bg-gradient-to-b from-white via-zinc-300 to-zinc-400 bg-clip-text pb-[0.06em] text-transparent"
      >
        <span class="hero-title-line block whitespace-nowrap"
          >Honduras&nbsp;Fintech</span
        >
        <span class="hero-title-line hero-title-line--last block pb-[0.14em]"
          >Day 2026</span
      </span>
    </h1>

    <p class="hero-sub" data-reveal>
      El evento de tecnología financiera más importante del país.<br />
      500+ asistentes, 20+ speakers y 40–50 stands en un solo día.
    </p>

    <div class="hero-ctas" data-reveal>
      <a href="#sobre" class="btn-pill-cta" data-magnetic>
        <span>Cómo será</span>
      </a>
      <a
        href="#patrocinios"
        class="btn-pill-cta btn-pill-cta--accent"
        data-magnetic
      >
        <span>Comprar entradas</span>
      </a>
      <a
        href="#contacto"
        class="btn-arrow"
        data-magnetic
        aria-label="Ir a contacto"
      >
        <svg
          viewBox="0 0 24 24"
          width="16"
          height="16"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M7 17L17 7M9 7h8v8"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
    </div>
  </div>
</section>
