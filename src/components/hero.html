<!-- ============== HERO ============== -->
<section class="hero">
  <canvas class="hero-grid" id="hero-grid" aria-hidden="true"></canvas>
  <span class="hero-corner hero-corner--tl" aria-hidden="true"></span>
  <span class="hero-corner hero-corner--tl-soft" aria-hidden="true"></span>
  <span class="hero-corner hero-corner--br" aria-hidden="true"></span>
  <span class="hero-vignette" aria-hidden="true"></span>

  <div class="hero-content">
    <p class="hero-meta" data-reveal>2026 · San Pedro Sula, Honduras</p>

    <h1 class="hero-title">
      <span class="hero-title-line hero-title-line--accent"
        >Honduras Fintech</span
      >
      <span class="hero-title-line">Day 2026</span>
    </h1>

    <p class="hero-sub" data-reveal>
      El evento de tecnología financiera más importante del país.<br />
      500+ asistentes, 20+ speakers y 40–50 stands en un solo día.
    </p>

    <div class="hero-ctas" data-reveal>
      <a href="#sobre" class="btn-pill-cta" data-magnetic>
        <span>Cómo será</span>
      </a>
      <a
        href="#patrocinios"
        class="btn-pill-cta btn-pill-cta--accent"
        data-magnetic
      >
        <span>Comprar entradas</span>
      </a>
      <a
        href="#contacto"
        class="btn-arrow"
        data-magnetic
        aria-label="Ir a contacto"
      >
        <svg
          viewBox="0 0 24 24"
          width="16"
          height="16"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M7 17L17 7M9 7h8v8"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
    </div>
  </div>
</section>
