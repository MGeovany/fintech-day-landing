<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Honduras Fintech Day">
  <defs>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Syne:wght@700&amp;display=swap");
    </style>
    <pattern id="grid" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.35" fill="#ffffff" opacity="0.055"/>
    </pattern>
    <linearGradient id="panel-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Inset UI panel -->
  <rect x="2.5" y="2.5" width="27" height="27" rx="6" fill="#101010"/>
  <rect x="2.5" y="2.5" width="27" height="27" rx="6" fill="url(#grid)"/>
  <rect x="2.5" y="2.5" width="27" height="27" rx="6" fill="url(#panel-shine)"/>
  <rect
    x="2.75"
    y="2.75"
    width="26.5"
    height="26.5"
    rx="5.75"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.08"
    stroke-width="0.75"
  />

  <!-- Window chrome dots -->
  <circle cx="6" cy="6" r="0.85" fill="#ffffff" opacity="0.18"/>
  <circle cx="9" cy="6" r="0.85" fill="#ffffff" opacity="0.1"/>
  <circle cx="12" cy="6" r="0.85" fill="#ffffff" opacity="0.06"/>

  <text
    x="16"
    y="21.5"
    fill="#ffffff"
    font-family="'Syne', ui-sans-serif, system-ui, sans-serif"
    font-size="10.5"
    font-weight="700"
    letter-spacing="-0.05em"
    text-anchor="middle"
  >HFD</text>
</svg>
